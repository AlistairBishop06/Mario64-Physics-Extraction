name: CI

on:
  push:
  pull_request:

jobs:
  core:
    name: Core tools and tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSM64PS_BUILD_APP=OFF -DSM64PS_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

